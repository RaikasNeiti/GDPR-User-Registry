version: '3.8'

services:
  app:
    build: .
    container_name: gdpr-user-registry

    ports:
      - "3000:3000"

    environment:
      NODE_ENV: development
      PORT: 3000
      # Postgres connection (Docker compose service 'db')
      PGHOST: db
      PGDATABASE: gdpr
      PGPORT: 5432
      VAULT_ADDR: https://192.168.1.125:8200
      VAULT_TOKEN: ${VAULT_TOKEN}
      VAULT_SECRET_PATH: secret/data/gdpr-db

    volumes:
      - app-data:/app/data

    depends_on:
      - db
    restart: unless-stopped

  db:
    image: postgres:15
    container_name: gdpr-user-registry-db
    environment:
      #POSTGRES_USER: ${DB_USER}
      #POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: gdpr
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  app-data:
  pgdata: